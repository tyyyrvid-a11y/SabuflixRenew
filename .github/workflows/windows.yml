name: Build Windows App

on:
  push:
    branches: [ "source", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        architecture: x64

    - name: Enable desktop support
      run: |
        flutter config --enable-windows-desktop

    - name: Install dependencies
      run: flutter pub get

    - name: Build Windows release
      run: flutter build windows --release

    - name: Bundle C++ Runtime DLLs
      run: |
        Copy-Item -Path "C:\Windows\System32\msvcp140.dll" -Destination "build\windows\x64\runner\Release\"
        Copy-Item -Path "C:\Windows\System32\vcruntime140.dll" -Destination "build\windows\x64\runner\Release\"
        Copy-Item -Path "C:\Windows\System32\vcruntime140_1.dll" -Destination "build\windows\x64\runner\Release\"

    - name: Compress Build
      run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath SabuFlix-Windows.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SabuFlix-Windows
        path: SabuFlix-Windows.zip
