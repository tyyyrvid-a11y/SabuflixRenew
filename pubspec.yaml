name: sabuflix
description: "SabuFlix - Streaming app com catálogo TMDB e design Liquid Glass"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  cached_network_image: ^3.4.1
  google_fonts: any
  shimmer: ^3.0.0
  shared_preferences: ^2.3.2
  video_player: ^2.9.2
  path_provider: ^2.1.4
  url_launcher: ^6.3.0
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
